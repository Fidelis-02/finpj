<script>
// =======================
// SIMULADOR
// =======================
function calcularSimulador() {
    const fat = parseInt(document.getElementById('simulador-fat').value);
    const margem = parseFloat(document.getElementById('simulador-margem').value);

    document.getElementById('lbl-fat').textContent =
        'R$ ' + (fat / 1000000).toFixed(1).replace('.', ',') + ' mi';

    const impostoS = fat * 0.11;

    const baseP = fat * 0.32;
    const irpjP = baseP * 0.15 + Math.max(0, baseP - 240000) * 0.10;
    const csllP = baseP * 0.09;
    const pisP = fat * 0.0065;
    const cofP = fat * 0.03;
    const impostoP = irpjP + csllP + pisP + cofP;

    const lucroReal = Math.max(0, fat * margem);
    const irpjR = lucroReal * 0.15 + Math.max(0, lucroReal - 240000) * 0.10;
    const csllR = lucroReal * 0.09;
    const impostoR = irpjR + csllR + (fat * 0.0165) + (fat * 0.076);

    const fmt = (v) => 'R$ ' + (v / 1000).toFixed(0)
        .replace(/\B(?=(\d{3})+(?!\d))/g, '.');

    document.getElementById('val-simples').textContent = fmt(impostoS);
    document.getElementById('pct-simples').textContent = ((impostoS / fat) * 100).toFixed(1) + '%';

    document.getElementById('val-presumido').textContent = fmt(impostoP);
    document.getElementById('pct-presumido').textContent = ((impostoP / fat) * 100).toFixed(1) + '%';

    document.getElementById('val-real').textContent = fmt(impostoR);
    document.getElementById('pct-real').textContent = ((impostoR / fat) * 100).toFixed(1) + '%';
}

// =======================
// MODAL
// =======================
function openModal(name) {
    document.getElementById(name + '-modal').classList.add('active');
    if (name === 'diagnose') calcularSimulador();
}

function closeModal(name) {
    document.getElementById(name + '-modal').classList.remove('active');
}

// =======================
// VALIDAÇÃO ETAPA 1 (CORRIGIDO)
// =======================
async function validarEtapa1() {
    const nome = document.getElementById('inp-nome');
    const cnpjInput = document.getElementById('inp-cnpj');

    let valido = true;

    if (!nome.value.trim()) {
        marcarErro('inp-nome');
        valido = false;
    } else {
        limparErro('inp-nome');
    }

    if (!validarCNPJ(cnpjInput.value)) {
        marcarErro('inp-cnpj');
        return false;
    }

    if (!valido) return false;

    const cnpj = cnpjInput.value.replace(/\D/g, '');

    try {
        const res = await fetch(`/api/cnpj?cnpj=${cnpj}`);

        if (!res.ok) throw new Error('Erro na API');

        const data = await res.json();

        if (!data || data.ativo === false) {
            alert('CNPJ não está ativo na Receita Federal');
            marcarErro('inp-cnpj');
            return false;
        }

        limparErro('inp-cnpj');
        return true;

    } catch (e) {
        alert('Erro ao validar CNPJ');
        return false;
    }
}

// =======================
// CONTROLE DE ETAPAS
// =======================
async function irParaEtapa2() {
    const valido = await validarEtapa1();
    if (valido) switchTab(2);
}

function switchTab(n) {
    const tabs = document.querySelectorAll('.tab-content');
    const btns = document.querySelectorAll('.tab-btn');

    tabs.forEach(t => t.classList.remove('active'));
    btns.forEach(b => b.classList.remove('active'));

    document.getElementById('tab' + n).classList.add('active');
    btns[n - 1].classList.add('active');

    if (n === 3) {
        enviarDiagnostico().then(ok => {
            if (ok) runAnalysis();
        });
    }
}

// =======================
// ANIMAÇÃO
// =======================
function runAnalysis() {
    const bars = ['p1', 'p2', 'p3', 'p4'];
    const pcts = ['p1-pct', 'p2-pct', 'p3-pct', 'p4-pct'];
    let step = 0;

    function animBar(idx, cb) {
        let pct = 0;
        const iv = setInterval(() => {
            pct = Math.min(100, pct + Math.floor(Math.random() * 8) + 4);
            document.getElementById(bars[idx]).style.width = pct + '%';
            document.getElementById(pcts[idx]).textContent = pct + '%';

            if (pct >= 100) {
                clearInterval(iv);
                setTimeout(cb, 200);
            }
        }, 60);
    }

    function next() {
        if (step < bars.length) {
            animBar(step, () => {
                step++;
                next();
            });
        } else {
            setTimeout(() => switchTab(4), 600);
        }
    }

    next();
}

// =======================
// ENVIO BACKEND
// =======================
async function enviarDiagnostico() {
    const dados = {
        nome: document.getElementById('inp-nome').value,
        cnpj: document.getElementById('inp-cnpj').value.replace(/\D/g, ''),
        setor: document.getElementById('inp-setor').value,
        regime: document.getElementById('inp-regime').value,
        faturamento: parseInt(document.getElementById('simulador-fat').value),
        margem: parseFloat(document.getElementById('simulador-margem').value)
    };

    try {
        const response = await fetch('/api/diagnosticos', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dados)
        });

        const resultado = await response.json();

        if (resultado.sucesso) {
            localStorage.setItem('diagnosisId', resultado.id);
            mostrarResultados(resultado.resultados);
            return true;
        }

    } catch (erro) {
        alert('Erro ao processar. Backend não está rodando.');
        return false;
    }
}

// =======================
// RESULTADOS
// =======================
function mostrarResultados(r) {
    document.getElementById('val-simples').textContent = 'R$ ' + (r.impostos.simples / 1000).toFixed(1) + 'k';
    document.getElementById('val-presumido').textContent = 'R$ ' + (r.impostos.presumido / 1000).toFixed(1) + 'k';
    document.getElementById('val-real').textContent = 'R$ ' + (r.impostos.real / 1000).toFixed(1) + 'k';
}

// =======================
// UTIL
// =======================
function formatarCNPJ(input) {
    let v = input.value.replace(/\D/g, '');
    if (v.length > 14) v = v.slice(0, 14);

    v = v.replace(/^(\d{2})(\d)/, '$1.$2');
    v = v.replace(/^(\d{2})\.(\d{3})(\d)/, '$1.$2.$3');
    v = v.replace(/\.(\d{3})(\d)/, '.$1/$2');
    v = v.replace(/(\d{4})(\d)/, '$1-$2');

    input.value = v;
}

function validarCNPJ(cnpj) {
    cnpj = cnpj.replace(/\D/g, '');
    if (cnpj.length !== 14) return false;
    if (/^(\d)\1+$/.test(cnpj)) return false;

    let tamanho = cnpj.length - 2;
    let numeros = cnpj.substring(0, tamanho);
    let digitos = cnpj.substring(tamanho);

    let soma = 0;
    let pos = tamanho - 7;

    for (let i = tamanho; i >= 1; i--) {
        soma += numeros.charAt(tamanho - i) * pos--;
        if (pos < 2) pos = 9;
    }

    let resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
    if (resultado != digitos.charAt(0)) return false;

    tamanho++;
    numeros = cnpj.substring(0, tamanho);
    soma = 0;
    pos = tamanho - 7;

    for (let i = tamanho; i >= 1; i--) {
        soma += numeros.charAt(tamanho - i) * pos--;
        if (pos < 2) pos = 9;
    }

    resultado = soma % 11 < 2 ? 0 : 11 - soma % 11;
    return resultado == digitos.charAt(1);
}

function marcarErro(id) {
    document.getElementById(id).style.border = '1px solid red';
}

function limparErro(id) {
    document.getElementById(id).style.border = '1px solid var(--border)';
}

function scrollTo(id) {
    document.getElementById(id).scrollIntoView({ behavior: 'smooth' });
}

// INIT
calcularSimulador();

</script>
